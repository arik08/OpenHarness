<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>미니 피하기 게임</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #101827;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap { text-align: center; }
    h1 { margin: 0 0 10px; font-size: 28px; }
    p { margin: 6px 0 14px; color: #cbd5e1; }
    canvas {
      background: linear-gradient(#1e293b, #0f172a);
      border: 3px solid #38bdf8;
      border-radius: 12px;
      box-shadow: 0 18px 50px rgba(0,0,0,.35);
      max-width: 92vw;
    }
    .hint { font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>⭐ 별 먹고 폭탄 피하기</h1>
    <p>점수: <b id="score">0</b> | 최고점: <b id="best">0</b></p>
    <canvas id="game" width="520" height="360"></canvas>
    <p class="hint">방향키/WASD로 이동 · 스페이스바로 재시작</p>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');

    const player = { x: 250, y: 170, size: 22, speed: 4 };
    const star = { x: 80, y: 80, size: 18 };
    const bombs = [];
    const keys = new Set();
    let score = 0;
    let best = Number(localStorage.bestScore || 0);
    let gameOver = false;
    bestEl.textContent = best;

    function randomPos(size) {
      return Math.random() * (canvas.width - size * 2) + size;
    }

    function moveStar() {
      star.x = randomPos(star.size);
      star.y = randomPos(star.size);
    }

    function addBomb() {
      const angle = Math.random() * Math.PI * 2;
      bombs.push({
        x: randomPos(12),
        y: randomPos(12),
        r: 12,
        vx: Math.cos(angle) * (1.4 + score * 0.08),
        vy: Math.sin(angle) * (1.4 + score * 0.08)
      });
    }

    function reset() {
      player.x = 250;
      player.y = 170;
      score = 0;
      gameOver = false;
      bombs.length = 0;
      addBomb();
      moveStar();
      scoreEl.textContent = score;
    }

    function hitCircleRect(circle, rect) {
      const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.size));
      const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.size));
      return Math.hypot(circle.x - closestX, circle.y - closestY) < circle.r;
    }

    function update() {
      if (gameOver) return;

      if (keys.has('ArrowLeft') || keys.has('a')) player.x -= player.speed;
      if (keys.has('ArrowRight') || keys.has('d')) player.x += player.speed;
      if (keys.has('ArrowUp') || keys.has('w')) player.y -= player.speed;
      if (keys.has('ArrowDown') || keys.has('s')) player.y += player.speed;

      player.x = Math.max(0, Math.min(canvas.width - player.size, player.x));
      player.y = Math.max(0, Math.min(canvas.height - player.size, player.y));

      for (const bomb of bombs) {
        bomb.x += bomb.vx;
        bomb.y += bomb.vy;
        if (bomb.x < bomb.r || bomb.x > canvas.width - bomb.r) bomb.vx *= -1;
        if (bomb.y < bomb.r || bomb.y > canvas.height - bomb.r) bomb.vy *= -1;
        if (hitCircleRect(bomb, player)) {
          gameOver = true;
          best = Math.max(best, score);
          localStorage.bestScore = best;
          bestEl.textContent = best;
        }
      }

      if (Math.hypot(player.x + player.size / 2 - star.x, player.y + player.size / 2 - star.y) < 26) {
        score++;
        scoreEl.textContent = score;
        moveStar();
        if (score % 3 === 0) addBomb();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      ctx.font = '24px serif';
      ctx.fillText('⭐', star.x - 12, star.y + 10);

      for (const bomb of bombs) {
        ctx.beginPath();
        ctx.arc(bomb.x, bomb.y, bomb.r, 0, Math.PI * 2);
        ctx.fillStyle = '#ef4444';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = '14px sans-serif';
        ctx.fillText('!', bomb.x - 3, bomb.y + 5);
      }

      ctx.fillStyle = '#22c55e';
      ctx.fillRect(player.x, player.y, player.size, player.size);
      ctx.strokeStyle = 'white';
      ctx.strokeRect(player.x, player.y, player.size, player.size);

      if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,.65)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = '34px sans-serif';
        ctx.fillText('게임 오버!', canvas.width / 2, canvas.height / 2 - 18);
        ctx.font = '18px sans-serif';
        ctx.fillText('스페이스바를 눌러 다시 시작', canvas.width / 2, canvas.height / 2 + 22);
        ctx.textAlign = 'left';
      }
    }

    function loop() {
      update();
      draw();
      requestAnimationFrame(loop);
    }

    window.addEventListener('keydown', (e) => {
      keys.add(e.key);
      if (e.code === 'Space' && gameOver) reset();
    });
    window.addEventListener('keyup', (e) => keys.delete(e.key));

    reset();
    loop();
  </script>
</body>
</html>
