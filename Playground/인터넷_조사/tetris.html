<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>간단한 테트리스</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #111827; color: #f9fafb; font-family: system-ui, sans-serif; }
    .wrap { display: flex; gap: 24px; align-items: flex-start; }
    canvas { background: #030712; border: 3px solid #374151; box-shadow: 0 12px 40px #0008; }
    .panel { width: 180px; line-height: 1.7; }
    button { padding: 8px 12px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .muted { color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="game" width="200" height="400"></canvas>
    <div class="panel">
      <h1>테트리스</h1>
      <p>점수: <b id="score">0</b></p>
      <button onclick="restart()">다시 시작</button>
      <p class="muted">
        ← → : 이동<br>
        ↓ : 빠르게<br>
        ↑ : 회전<br>
        Space : 바로 떨어뜨리기<br>
        P : 일시정지
      </p>
      <p id="state" class="muted"></p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const stateEl = document.getElementById('state');
    const COLS = 10, ROWS = 20, SIZE = 20;

    const colors = [null, '#22c55e', '#06b6d4', '#eab308', '#f97316', '#ef4444', '#8b5cf6', '#3b82f6'];
    const pieces = [
      [[1, 1, 1, 1]],
      [[2, 2], [2, 2]],
      [[0, 3, 0], [3, 3, 3]],
      [[4, 0, 0], [4, 4, 4]],
      [[0, 0, 5], [5, 5, 5]],
      [[6, 6, 0], [0, 6, 6]],
      [[0, 7, 7], [7, 7, 0]]
    ];

    let board, player, score, dropCounter, dropInterval, lastTime, gameOver, paused;

    function createBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    }

    function newPiece() {
      const matrix = pieces[Math.floor(Math.random() * pieces.length)].map(row => [...row]);
      return { matrix, x: Math.floor(COLS / 2) - Math.ceil(matrix[0].length / 2), y: 0 };
    }

    function collide() {
      for (let y = 0; y < player.matrix.length; y++) {
        for (let x = 0; x < player.matrix[y].length; x++) {
          if (!player.matrix[y][x]) continue;
          const bx = player.x + x;
          const by = player.y + y;
          if (bx < 0 || bx >= COLS || by >= ROWS || (by >= 0 && board[by][bx])) return true;
        }
      }
      return false;
    }

    function merge() {
      player.matrix.forEach((row, y) => row.forEach((value, x) => {
        if (value) board[player.y + y][player.x + x] = value;
      }));
    }

    function clearLines() {
      let lines = 0;
      outer: for (let y = ROWS - 1; y >= 0; y--) {
        for (let x = 0; x < COLS; x++) if (!board[y][x]) continue outer;
        board.splice(y, 1);
        board.unshift(Array(COLS).fill(0));
        y++;
        lines++;
      }
      if (lines) {
        score += [0, 100, 300, 500, 800][lines];
        scoreEl.textContent = score;
        dropInterval = Math.max(120, 700 - Math.floor(score / 500) * 60);
      }
    }

    function rotate(matrix) {
      return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
    }

    function rotatePlayer() {
      const old = player.matrix;
      const oldX = player.x;
      player.matrix = rotate(player.matrix);
      for (const offset of [0, -1, 1, -2, 2]) {
        player.x = oldX + offset;
        if (!collide()) return;
      }
      player.matrix = old;
      player.x = oldX;
    }

    function drop() {
      player.y++;
      if (collide()) {
        player.y--;
        merge();
        clearLines();
        player = newPiece();
        if (collide()) {
          gameOver = true;
          stateEl.textContent = '게임 오버! 다시 시작을 눌러주세요.';
        }
      }
      dropCounter = 0;
    }

    function hardDrop() {
      while (!collide()) player.y++;
      player.y--;
      merge();
      clearLines();
      player = newPiece();
      if (collide()) {
        gameOver = true;
        stateEl.textContent = '게임 오버! 다시 시작을 눌러주세요.';
      }
      dropCounter = 0;
    }

    function move(dir) {
      player.x += dir;
      if (collide()) player.x -= dir;
    }

    function drawCell(x, y, value) {
      ctx.fillStyle = colors[value];
      ctx.fillRect(x * SIZE, y * SIZE, SIZE - 1, SIZE - 1);
    }

    function draw() {
      ctx.fillStyle = '#030712';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      board.forEach((row, y) => row.forEach((value, x) => value && drawCell(x, y, value)));
      player.matrix.forEach((row, y) => row.forEach((value, x) => value && drawCell(player.x + x, player.y + y, value)));
    }

    function update(time = 0) {
      const delta = time - lastTime;
      lastTime = time;
      if (!paused && !gameOver) {
        dropCounter += delta;
        if (dropCounter > dropInterval) drop();
      }
      draw();
      requestAnimationFrame(update);
    }

    function restart() {
      board = createBoard();
      player = newPiece();
      score = 0;
      dropCounter = 0;
      dropInterval = 700;
      lastTime = 0;
      gameOver = false;
      paused = false;
      scoreEl.textContent = score;
      stateEl.textContent = '';
    }

    document.addEventListener('keydown', e => {
      if (e.key.toLowerCase() === 'p') {
        paused = !paused;
        stateEl.textContent = paused ? '일시정지' : '';
        return;
      }
      if (gameOver || paused) return;
      if (e.key === 'ArrowLeft') move(-1);
      else if (e.key === 'ArrowRight') move(1);
      else if (e.key === 'ArrowDown') drop();
      else if (e.key === 'ArrowUp') rotatePlayer();
      else if (e.code === 'Space') {
        e.preventDefault();
        hardDrop();
      }
    });

    restart();
    update();
  </script>
</body>
</html>
