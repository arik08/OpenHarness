<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MyHarness</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23181715'/%3E%3Cpath d='M9 17.5 14.2 22 23 10' fill='none' stroke='%23f7f3ea' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="/vendor/highlight/github-dark.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="채팅 탐색">
        <div class="brand-row">
          <a class="brand" href="#" aria-label="MyHarness 채팅 홈">
            <span class="brand-name">MyHarness</span>
          </a>
          <button class="fullscreen-command" type="button" data-action="toggle-fullscreen" aria-label="브라우저 전체화면" data-tooltip="브라우저 전체화면">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <rect x="3" y="4" width="18" height="16" rx="2"></rect>
              <path d="M3 8h18"></path>
              <path d="M8 13H6v-2"></path>
              <path d="M16 13h2v-2"></path>
              <path d="M8 15H6v2"></path>
              <path d="M16 15h2v2"></path>
            </svg>
          </button>
          <button class="settings-command" type="button" data-action="open-settings" aria-label="설정" data-tooltip="설정">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
              <path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.04.04a2.15 2.15 0 0 1-3.04 3.04l-.04-.04a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.66V21.4a2.15 2.15 0 0 1-4.3 0v-.06a1.8 1.8 0 0 0-1.1-1.66 1.8 1.8 0 0 0-1.98.36l-.04.04a2.15 2.15 0 1 1-3.04-3.04l.04-.04A1.8 1.8 0 0 0 3.6 15a1.8 1.8 0 0 0-1.66-1.1H1.9a2.15 2.15 0 0 1 0-4.3h.06A1.8 1.8 0 0 0 3.6 8a1.8 1.8 0 0 0-.36-1.98l-.04-.04a2.15 2.15 0 1 1 3.04-3.04l.04.04A1.8 1.8 0 0 0 8.26 3.34 1.8 1.8 0 0 0 9.36 1.68V1.6a2.15 2.15 0 0 1 4.3 0v.06a1.8 1.8 0 0 0 1.1 1.66 1.8 1.8 0 0 0 1.98-.36l.04-.04a2.15 2.15 0 1 1 3.04 3.04l-.04.04A1.8 1.8 0 0 0 19.4 8a1.8 1.8 0 0 0 1.66 1.1h.06a2.15 2.15 0 0 1 0 4.3h-.06A1.8 1.8 0 0 0 19.4 15Z"></path>
            </svg>
          </button>
          <button class="theme-command" type="button" data-action="toggle-theme" aria-label="테마 전환" data-tooltip="테마: Light">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 3v2.2"></path>
              <path d="M12 18.8V21"></path>
              <path d="M4.2 4.2l1.55 1.55"></path>
              <path d="M18.25 18.25l1.55 1.55"></path>
              <path d="M3 12h2.2"></path>
              <path d="M18.8 12H21"></path>
              <path d="M4.2 19.8l1.55-1.55"></path>
              <path d="M18.25 5.75l1.55-1.55"></path>
              <circle cx="12" cy="12" r="4.25"></circle>
            </svg>
          </button>
          <button class="brand-command" type="button" data-prompt="/help" aria-label="명령어" data-tooltip="명령어">
            <span class="command-key" aria-hidden="true">/</span>
          </button>
          <button class="sidebar-toggle" type="button" data-action="toggle-sidebar" aria-label="사이드바 닫기" aria-expanded="true" data-tooltip="사이드바 닫기">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M15 6l-6 6 6 6"></path>
            </svg>
          </button>
        </div>

        <div class="sidebar-project-menu">
          <button class="sidebar-project" type="button" data-action="open-workspace" aria-label="프로젝트 선택" aria-expanded="false" data-tooltip="현재 프로젝트 선택">
            <span class="sidebar-project-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24">
                <path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2.5h6.5A2.5 2.5 0 0 1 21 9v7.5a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 16.5Z"></path>
              </svg>
            </span>
            <strong data-workspace-name>Default</strong>
            <svg class="sidebar-project-chevron" aria-hidden="true" viewBox="0 0 24 24">
              <path d="m7 10 5 5 5-5"></path>
            </svg>
          </button>
          <div class="sidebar-project-dropdown hidden" id="workspaceDropdown" role="menu" aria-label="Project list"></div>
        </div>

        <button class="new-chat" type="button" data-action="new-chat" aria-label="새 채팅 (Ctrl+Shift+O)" data-tooltip="단축키: Ctrl+Shift+O">
          <span aria-hidden="true"></span>
          새 채팅
        </button>

        <section class="history-panel" aria-label="Chat History">
          <div class="history-heading">
            <span class="section-label">Chat History</span>
            <button class="history-refresh" type="button" id="historyRefresh" aria-label="터미널 세션 재시작">Restart</button>
          </div>
          <div class="history-list" id="historyList">
            <p class="empty">대화 내역을 불러오는 중...</p>
          </div>
        </section>

        <button class="sidebar-footer" type="button" data-action="open-model-settings" aria-label="모델 설정 열기" data-tooltip="모델 설정">
          <span class="profile-mark" aria-hidden="true">MH</span>
          <div class="runtime-copy">
            <strong id="providerValue">Provider: 불러오는 중...</strong>
            <small id="modelValue">Model: 불러오는 중...</small>
          </div>
        </button>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div class="header-left">
            <button class="chat-title" type="button" id="chatTitle">
              <span>MyHarness</span>
            </button>
          </div>
          <div class="header-actions">
            <div class="status-pill" id="readyPill">연결 중</div>
            <button class="header-icon-button" type="button" id="projectFilesButton" aria-label="프로젝트 파일 보기" data-tooltip="프로젝트 파일">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"></path>
                <path d="M14 2v6h6"></path>
                <path d="M8 13h8"></path>
                <path d="M8 17h6"></path>
              </svg>
            </button>
          </div>
        </header>

        <section class="messages" id="messages" aria-live="polite">
          <div class="welcome">
            <span class="welcome-mark">MH</span>
            <h2>무엇을 도와드릴까요?</h2>
            <p>
              업무에 필요한 조사, 정리, 코드 작업을 도와드릴 준비가 되어 있습니다.
            </p>
          </div>
        </section>

        <form class="composer" id="composer">
          <div class="todo-checklist-dock hidden" id="todoChecklistDock" aria-label="작업 체크리스트"></div>
          <div class="pasted-text-tray hidden" id="pastedTextTray" aria-label="Pasted text"></div>
          <div class="composer-box">
            <div class="attachment-tray hidden" id="attachmentTray" aria-label="첨부한 이미지"></div>
            <span class="composer-token-slot hidden" id="composerToken" aria-hidden="true"></span>
            <textarea
              id="promptInput"
              rows="1"
              placeholder="메세지를 입력하세요..."
              autocomplete="off"
              spellcheck="false"
              autocorrect="off"
              autocapitalize="off"
            ></textarea>
            <button class="plan-mode-indicator hidden" id="planModeIndicator" type="button" aria-label="계획모드 전환">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M9 6h11" />
                <path d="M9 12h11" />
                <path d="M9 18h11" />
                <path d="M4 6h.01" />
                <path d="M4 12h.01" />
                <path d="M4 18h.01" />
              </svg>
              <span>계획모드</span>
            </button>
            <button id="sendButton" type="submit" disabled aria-label="메시지 보내기">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m22 2-7 20-4-9-9-4Z" />
                <path d="M22 2 11 13" />
              </svg>
            </button>
          </div>
          <div class="slash-menu hidden" id="slashMenu" role="listbox" aria-label="명령어와 스킬"></div>
        </form>
      </main>

      <aside class="artifact-panel hidden" id="artifactPanel" aria-label="산출물 미리보기">
        <div class="artifact-resize-handle" id="artifactResizeHandle" role="separator" aria-orientation="vertical" aria-label="산출물 패널 폭 조절"></div>
        <div class="artifact-panel-header">
          <div class="artifact-panel-title">
            <strong id="artifactPanelTitle">산출물</strong>
            <small id="artifactPanelMeta">파일을 선택하세요</small>
          </div>
          <div class="artifact-panel-actions">
            <button class="artifact-action" type="button" id="artifactPanelSource" aria-label="원문보기" data-tooltip="원문보기" disabled>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="m16 18 6-6-6-6"></path>
                <path d="m8 6-6 6 6 6"></path>
              </svg>
            </button>
            <button class="artifact-action" type="button" id="artifactPanelCopy" aria-label="원문 복사" data-tooltip="원문 복사" disabled>
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <rect x="9" y="9" width="11" height="11" rx="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>
            <button class="artifact-action" type="button" id="artifactPanelFullscreen" aria-label="산출물 미리보기 확대" data-tooltip="미리보기 확대">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M8 3H5a2 2 0 0 0-2 2v3"></path>
                <path d="M16 3h3a2 2 0 0 1 2 2v3"></path>
                <path d="M8 21H5a2 2 0 0 1-2-2v-3"></path>
                <path d="M16 21h3a2 2 0 0 0 2-2v-3"></path>
              </svg>
            </button>
            <button class="artifact-action artifact-close" type="button" id="artifactPanelClose" aria-label="산출물 패널 닫기" data-tooltip="닫기">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="artifact-viewer" id="artifactViewer">
          <p class="artifact-empty">최종 답변의 산출물 카드를 선택하면 여기에 표시됩니다.</p>
        </div>
      </aside>

      <div class="sr-only" id="cwdValue">-</div>
      <div class="sr-only tool-list" id="toolList"></div>
      <div class="sr-only task-list" id="taskList"></div>
    </div>

    <div class="modal-backdrop hidden" id="modalHost" role="presentation"></div>

    <script src="/vendor/highlight/highlight.min.js"></script>
    <script type="module" src="./script.js"></script>
  </body>
</html>
